name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  cpp:
    name: C++ (clang-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: clang-format check
        # DoozyX is the canonical clang-format CI action (used by
        # google/benchmark, apache/doris, magma, sgl-project, etc.).
        uses: DoozyX/clang-format-lint-action@v0.20
        with:
          source: "src"
          extensions: "h,cpp"
          clangFormatVersion: 18

  markdown:
    name: Markdown (markdownlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.48

      - name: markdownlint
        run: |
          FILES=$(git ls-files '*.md')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs markdownlint -c .markdownlint.json
          fi
